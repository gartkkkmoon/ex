<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exx Wallet Control Platform Preview</title>
    <style>
:root {
  color-scheme: dark;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #080b12;
  color: #f7f7ff;
  font-synthesis: none;
  letter-spacing: 0;
}

* {
  box-sizing: border-box;
}

body {
  min-width: 320px;
  margin: 0;
  background:
    radial-gradient(circle at 20% 0%, rgba(104, 87, 242, 0.18), transparent 25rem),
    linear-gradient(135deg, #080b12 0%, #10121e 48%, #090b12 100%);
}

button,
input {
  font: inherit;
}

button {
  cursor: pointer;
}

.app-shell {
  min-height: 100vh;
  padding: 22px;
}

.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  max-width: 1320px;
  margin: 0 auto 18px;
}

.app-header h1 {
  margin: 3px 0 0;
  font-size: clamp(26px, 4vw, 42px);
  line-height: 1;
  letter-spacing: 0;
}

.eyebrow {
  color: #9ca0b8;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
}

.mode-switch,
.filter-bar,
.range-tabs,
.filter-chips {
  display: flex;
  align-items: center;
  gap: 8px;
}

.mode-switch {
  padding: 6px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 14px;
  background: rgba(23, 28, 41, 0.78);
}

.mode-switch button,
.filter-bar button,
.range-tabs button,
.filter-chips button {
  min-height: 34px;
  border: 0;
  border-radius: 999px;
  padding: 0 14px;
  background: transparent;
  color: #9ca0b8;
  font-size: 13px;
  font-weight: 800;
}

.mode-switch .active,
.filter-bar .active,
.range-tabs .active,
.filter-chips .active {
  background: #f7f7ff;
  color: #171c29;
}

.wallet-stage {
  display: grid;
  grid-template-columns: minmax(360px, 430px) minmax(420px, 1fr);
  gap: 26px;
  align-items: start;
  max-width: 1320px;
  margin: 0 auto;
}

.phone-shell {
  position: relative;
  min-height: 820px;
  overflow: hidden;
  border: 10px solid #070a12;
  border-radius: 38px;
  background:
    linear-gradient(180deg, rgba(108, 92, 231, 0.20), transparent 36%),
    #151729;
  box-shadow: 0 28px 70px rgba(0, 0, 0, 0.48);
}

.phone-status {
  display: flex;
  justify-content: space-between;
  padding: 14px 20px 0;
  color: #f7f7ff;
  font-size: 11px;
  font-weight: 700;
}

.status-icons {
  color: #cdd1e9;
  letter-spacing: 1px;
}

.wallet-topline {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 48px;
  padding: 8px 18px;
  color: #f7f7ff;
}

.wallet-topline strong {
  font-size: 13px;
  letter-spacing: 0;
}

.icon-button {
  display: inline-grid;
  place-items: center;
  width: 36px;
  height: 36px;
  border: 0;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.03);
  color: #e7e7fb;
  font-size: 24px;
}

.wallet-home,
.asset-detail,
.assets-manage,
.flow-screen {
  padding: 4px 22px 110px;
}

.wallet-home {
  text-align: center;
}

.exodus-orb,
.token-icon {
  display: inline-grid;
  place-items: center;
  color: #fff;
  background:
    radial-gradient(circle at 35% 28%, rgba(255, 255, 255, 0.7), transparent 12%),
    radial-gradient(circle at 50% 55%, var(--token, #7457f2), #413093 66%, #1a1f36);
  box-shadow: 0 0 24px color-mix(in srgb, var(--token, #7457f2) 55%, transparent);
}

.exodus-orb {
  width: 84px;
  height: 84px;
  margin: 14px auto 14px;
  border-radius: 50%;
  font-size: 34px;
  --token: #7457f2;
}

.wallet-home h1 {
  margin: 0 0 12px;
  font-size: 30px;
  font-weight: 700;
  letter-spacing: 0;
}

.home-actions {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 18px;
}

.home-actions button,
.primary-flow,
.ops-panel > button {
  min-height: 40px;
  border: 0;
  border-radius: 999px;
  padding: 0 18px;
  background: #7457f2;
  color: #fff;
  font-weight: 800;
}

.home-actions button + button {
  background: #252840;
}

.portfolio-strip,
.formula-box,
.schema-strip,
.integration-panel,
.ops-panel,
.metric-tile {
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: rgba(29, 34, 53, 0.84);
}

.portfolio-strip {
  display: grid;
  gap: 4px;
  margin-bottom: 16px;
  border-radius: 18px;
  padding: 14px;
  text-align: left;
}

.portfolio-strip span,
.formula-box span,
.panel-heading span,
.metric-tile span {
  color: #9ca0b8;
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
}

.portfolio-strip strong {
  font-size: 28px;
}

.portfolio-strip small,
.formula-box small,
.metric-tile small,
.tx-row small,
.asset-copy small,
.manage-row small {
  color: #9ca0b8;
}

.feature-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}

.feature-grid button {
  display: grid;
  gap: 8px;
  min-height: 86px;
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: 18px;
  background: #22253b;
  color: #e8e9ff;
  font-size: 13px;
  font-weight: 800;
}

.feature-grid span {
  color: #8e5cff;
  font-size: 28px;
}

.mini-assets,
.asset-list,
.tx-feed,
.architecture-list,
.security-list,
.admin-log-strip {
  display: grid;
  gap: 10px;
}

.asset-card,
.manage-row {
  display: grid;
  grid-template-columns: 46px 1fr auto;
  gap: 12px;
  align-items: center;
  width: 100%;
  min-height: 70px;
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: 16px;
  padding: 12px;
  background: linear-gradient(180deg, #272a42, #202338);
  color: #fff;
  text-align: left;
}

.token-icon {
  width: 42px;
  height: 42px;
  border-radius: 14px;
  font-size: 18px;
  font-weight: 900;
}

.token-icon.large {
  width: 58px;
  height: 58px;
  border-radius: 50%;
  margin: 8px auto 12px;
  font-size: 22px;
}

.asset-copy {
  display: grid;
  gap: 3px;
}

.asset-symbol,
.manage-row em {
  font-size: 12px;
  font-style: normal;
  font-weight: 900;
}

.positive {
  color: #28e0b0;
  font-style: normal;
}

.negative {
  color: #ef5b6d;
  font-style: normal;
}

.asset-detail {
  text-align: center;
}

.asset-detail h2 {
  margin: 0;
  font-size: 32px;
  line-height: 1.1;
  letter-spacing: 0;
}

.asset-detail p {
  margin: 5px 0 8px;
  color: #aeb3cc;
  font-size: 13px;
}

.price-chart {
  width: 100%;
  height: 190px;
  margin: 16px 0 6px;
}

.range-tabs {
  justify-content: space-between;
  margin: 0 0 18px;
}

.range-tabs button {
  min-width: 34px;
  min-height: 28px;
  padding: 0 8px;
  font-size: 10px;
}

.balance-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  overflow: hidden;
  margin-top: 10px;
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.06);
}

.balance-row span {
  display: grid;
  gap: 4px;
  padding: 18px 14px;
  background: #191c31;
}

.balance-row strong {
  color: #f8c62c;
  font-size: 18px;
}

.balance-row small {
  color: #9ca0b8;
  font-size: 12px;
}

.empty-note,
.flow-note {
  margin: 18px auto;
  max-width: 290px;
  color: #9ca0b8;
  font-size: 12px;
  line-height: 1.5;
}

.action-dock,
.wallet-bottom-nav {
  position: absolute;
  left: 24px;
  right: 24px;
  display: grid;
  align-items: center;
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: rgba(43, 45, 68, 0.92);
  box-shadow: 0 16px 30px rgba(0, 0, 0, 0.28);
  backdrop-filter: blur(12px);
}

.action-dock {
  bottom: 24px;
  grid-template-columns: repeat(4, 1fr);
  min-height: 70px;
  border-radius: 36px;
  padding: 8px;
}

.action-dock button,
.wallet-bottom-nav button {
  display: grid;
  place-items: center;
  border: 0;
  background: transparent;
  color: #f7f7ff;
  font-weight: 800;
}

.action-dock button:nth-child(2),
.action-dock button:nth-child(3),
.wallet-bottom-nav button:nth-child(2) {
  min-height: 52px;
  border-radius: 26px;
  background: #7357f2;
}

.action-dock span {
  font-size: 18px;
}

.action-dock small {
  font-size: 9px;
}

.wallet-bottom-nav {
  bottom: 24px;
  grid-template-columns: repeat(3, 1fr);
  min-height: 62px;
  border-radius: 32px;
  padding: 7px;
}

.assets-manage .search-field {
  margin-bottom: 12px;
}

.search-field {
  display: flex;
  align-items: center;
  gap: 10px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 999px;
  padding: 0 14px;
  background: #202338;
}

.search-field input {
  width: 100%;
  min-height: 42px;
  border: 0;
  outline: 0;
  background: transparent;
  color: #fff;
}

.filter-chips {
  overflow-x: auto;
  margin-bottom: 14px;
}

.manage-row em {
  display: grid;
  place-items: center;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: #7457f2;
  color: white;
}

.flow-screen {
  display: grid;
  gap: 14px;
}

.flow-screen label {
  display: grid;
  gap: 8px;
  color: #9ca0b8;
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
}

.flow-screen input,
.config-grid input,
.flow-screen code {
  width: 100%;
  min-height: 48px;
  overflow-wrap: anywhere;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 16px;
  padding: 13px 14px;
  background: #202338;
  color: #f7f7ff;
  text-transform: none;
}

.config-grid input {
  min-height: 38px;
  border-radius: 12px;
  padding: 0 12px;
  background: #111622;
}

.primary-flow {
  min-height: 52px;
  border-radius: 18px;
}

.qr-preview {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  width: 190px;
  height: 190px;
  margin: 8px auto;
  border-radius: 20px;
  padding: 16px;
  background: #f7f7ff;
}

.qr-preview span {
  border-radius: 4px;
  background: #d9dbeb;
}

.qr-preview .on {
  background: #151729;
}

.wallet-ledger {
  display: grid;
  gap: 14px;
}

.panel-heading {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 16px;
}

.panel-heading strong {
  font-size: 32px;
}

.panel-heading.compact strong {
  font-size: 15px;
}

.formula-box,
.schema-strip {
  display: grid;
  gap: 7px;
  border-radius: 18px;
  padding: 18px;
}

.formula-box strong {
  font-size: 30px;
}

.integration-panel {
  display: grid;
  gap: 12px;
  border-radius: 18px;
  padding: 14px;
}

.integration-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.integration-actions button,
.save-config {
  min-height: 34px;
  border: 0;
  border-radius: 999px;
  padding: 0 12px;
  background: #252840;
  color: #fff;
  font-size: 12px;
  font-weight: 800;
}

.integration-actions button:first-child,
.save-config {
  background: #7457f2;
}

.config-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.config-grid label {
  display: grid;
  gap: 6px;
  color: #9ca0b8;
  font-size: 12px;
  font-weight: 800;
}

.live-status {
  display: grid;
  gap: 4px;
  color: #9ca0b8;
  font-size: 12px;
}

.live-status code {
  color: #dfe3f6;
}

.live-balance-table {
  max-height: 260px;
  overflow: auto;
}

.tx-feed {
  border-radius: 18px;
}

.tx-row {
  display: grid;
  grid-template-columns: 38px 1fr auto;
  gap: 12px;
  align-items: center;
  min-height: 64px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 16px;
  padding: 12px;
  background: rgba(29, 34, 53, 0.74);
}

.tx-row > span:nth-child(2) {
  display: grid;
  gap: 2px;
}

.tx-direction {
  display: grid;
  place-items: center;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  font-weight: 900;
}

.tx-direction.incoming {
  background: rgba(40, 224, 176, 0.14);
  color: #28e0b0;
}

.tx-direction.outgoing {
  background: rgba(239, 91, 109, 0.14);
  color: #ef5b6d;
}

.status-pill,
.chain-pill {
  display: inline-grid;
  place-items: center;
  min-height: 24px;
  width: max-content;
  border-radius: 999px;
  padding: 0 9px;
  font-size: 11px;
  font-weight: 900;
}

.status-pill.ok {
  background: rgba(40, 224, 176, 0.14);
  color: #28e0b0;
}

.status-pill.warn {
  background: rgba(248, 198, 44, 0.14);
  color: #f8c62c;
}

.status-pill.bad {
  background: rgba(239, 91, 109, 0.14);
  color: #ef5b6d;
}

.chain-pill {
  background: color-mix(in srgb, var(--chain) 18%, transparent);
  color: var(--chain);
}

.schema-strip code,
.vault-preview {
  display: block;
  overflow-wrap: anywhere;
  border-radius: 10px;
  padding: 8px 10px;
  background: #10131f;
  color: #cbd0eb;
}

.admin-shell {
  display: grid;
  grid-template-columns: 220px minmax(0, 1fr);
  max-width: 1320px;
  min-height: 740px;
  margin: 0 auto;
  overflow: hidden;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 22px;
  background: #0d1018;
  box-shadow: 0 28px 70px rgba(0, 0, 0, 0.36);
}

.admin-sidebar {
  display: grid;
  align-content: start;
  gap: 8px;
  border-right: 1px solid rgba(255, 255, 255, 0.08);
  padding: 18px;
  background: #111622;
}

.brand-mark {
  margin-bottom: 16px;
  color: #fff;
  font-size: 22px;
}

.admin-sidebar button {
  min-height: 38px;
  border: 0;
  border-radius: 10px;
  padding: 0 12px;
  background: transparent;
  color: #9ca0b8;
  text-align: left;
  font-size: 13px;
  font-weight: 800;
}

.admin-sidebar button.active {
  background: #1d2433;
  color: #fff;
}

.admin-content {
  min-width: 0;
  padding: 18px;
}

.admin-topbar {
  display: grid;
  grid-template-columns: max-content minmax(240px, 1fr) max-content;
  gap: 14px;
  align-items: center;
  margin-bottom: 16px;
}

.admin-topbar span {
  font-weight: 900;
}

.admin-topbar button {
  min-height: 40px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 999px;
  padding: 0 14px;
  background: #1d2433;
  color: #f7f7ff;
  font-weight: 800;
}

.admin-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
  margin-bottom: 12px;
}

.metric-tile {
  display: grid;
  gap: 8px;
  border-radius: 14px;
  padding: 16px;
}

.metric-tile strong {
  font-size: 28px;
}

.admin-panels {
  display: grid;
  grid-template-columns: minmax(0, 1.5fr) minmax(360px, 1fr);
  gap: 12px;
}

.ops-panel {
  min-width: 0;
  border-radius: 14px;
  padding: 16px;
}

.ops-panel.full {
  grid-column: 1 / -1;
}

.ops-panel h2 {
  margin: 0 0 12px;
  font-size: 16px;
}

.table-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 700px;
}

th,
td {
  border-bottom: 1px solid rgba(255, 255, 255, 0.07);
  padding: 10px 8px;
  color: #dfe3f6;
  text-align: left;
  font-size: 13px;
  white-space: nowrap;
}

th {
  color: #8f98ad;
  font-size: 11px;
  text-transform: uppercase;
}

td code,
.schema-strip code,
.vault-preview {
  font-family: "SFMono-Regular", Consolas, monospace;
  font-size: 12px;
}

.security-list {
  margin: 0 0 14px;
  padding-left: 18px;
  color: #c5cadc;
  font-size: 13px;
  line-height: 1.45;
}

.architecture-list {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.architecture-list span,
.admin-log-strip span {
  display: grid;
  gap: 4px;
  border-radius: 12px;
  padding: 11px;
  background: #111622;
  color: #dfe3f6;
  font-size: 12px;
  font-weight: 800;
}

.admin-log-strip {
  margin-top: 14px;
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.iteration-footer {
  max-width: 1320px;
  margin: 18px auto 0;
  color: #8f98ad;
  font-size: 12px;
}

@media (max-width: 980px) {
  .app-shell {
    padding: 14px;
  }

  .app-header,
  .wallet-stage,
  .admin-shell {
    grid-template-columns: 1fr;
  }

  .app-header {
    display: grid;
  }

  .phone-shell {
    max-width: 430px;
    width: 100%;
    margin: 0 auto;
  }

  .admin-shell {
    display: block;
  }

  .admin-sidebar {
    display: flex;
    overflow-x: auto;
    border-right: 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }

  .admin-sidebar button {
    white-space: nowrap;
  }

  .admin-topbar,
  .admin-grid,
  .admin-panels {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 460px) {
  .phone-shell {
    min-height: 760px;
    border-width: 6px;
    border-radius: 30px;
  }

  .wallet-home,
  .asset-detail,
  .assets-manage,
  .flow-screen {
    padding-inline: 14px;
  }

  .action-dock,
  .wallet-bottom-nav {
    left: 14px;
    right: 14px;
  }
}

    </style>

function buildAnkrUrl(chainId, token = "") {
  const chain = SUPPORTED_CHAINS[chainId];
  if (!chain) {
    throw new Error(`Unsupported chain: ${chainId}`);
  }
  const suffix = token ? `/${token}` : "";
  return `https://rpc.ankr.com/${chain.ankrSlug}${suffix}`;
}


function toNumber(rawValue) {
  const value = Number(rawValue);
  return Number.isFinite(value) ? value : 0;
}

function computeMainBalance({ confirmed = 0, pendingIncoming = 0, pendingOutgoing = 0 }) {
  return toNumber(confirmed) + toNumber(pendingIncoming) - toNumber(pendingOutgoing);
}

function computeWalletTotals(wallets, transactions) {
  return wallets.map((wallet) => {
    const pendingIncoming = transactions
      .filter((tx) => tx.walletId === wallet.id && tx.status !== "confirmed" && tx.direction === "incoming")
      .reduce((total, tx) => total + toNumber(tx.amountUsd), 0);

    const pendingOutgoing = transactions
      .filter((tx) => tx.walletId === wallet.id && tx.status !== "confirmed" && tx.direction === "outgoing")
      .reduce((total, tx) => total + toNumber(tx.amountUsd), 0);

    return {
      ...wallet,
      pendingIncoming,
      pendingOutgoing,
      mainBalanceUsd: computeMainBalance({
        confirmed: wallet.confirmedUsd,
        pendingIncoming,
        pendingOutgoing,
      }),
    };
  });
}

function summarizePortfolio(wallets) {
  return wallets.reduce(
    (summary, wallet) => ({
      confirmedUsd: summary.confirmedUsd + toNumber(wallet.confirmedUsd),
      pendingIncomingUsd: summary.pendingIncomingUsd + toNumber(wallet.pendingIncoming),
      pendingOutgoingUsd: summary.pendingOutgoingUsd + toNumber(wallet.pendingOutgoing),
      mainBalanceUsd: summary.mainBalanceUsd + toNumber(wallet.mainBalanceUsd),
    }),
    {
      confirmedUsd: 0,
      pendingIncomingUsd: 0,
      pendingOutgoingUsd: 0,
      mainBalanceUsd: 0,
    },
  );
}



const BALANCE_OF_SELECTOR = "0x70a08231";

function strip0x(value) {
  return value.replace(/^0x/i, "");
}

function padAddress(address) {
  return strip0x(address).toLowerCase().padStart(64, "0");
}

function formatUnits(raw, decimals = 18) {
  const value = BigInt(raw || "0");
  const base = 10n ** BigInt(decimals);
  const whole = value / base;
  const fraction = value % base;
  const fractionText = fraction.toString().padStart(decimals, "0").replace(/0+$/, "");
  return fractionText ? `${whole}.${fractionText}` : whole.toString();
}

class AnkrRpcClient {
  constructor({ apiToken = "", endpoints = {} } = {}) {
    this.apiToken = apiToken;
    this.endpoints = endpoints;
    this.requestId = 1;
  }

  endpoint(chainId) {
    if (this.endpoints[chainId]) return this.endpoints[chainId];
    return buildAnkrUrl(chainId, this.apiToken);
  }

  async call(chainId, method, params = []) {
    if (!SUPPORTED_CHAINS[chainId]) {
      throw new Error(`Unsupported Ankr chain: ${chainId}`);
    }

    const response = await fetch(this.endpoint(chainId), {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({
        jsonrpc: "2.0",
        id: this.requestId++,
        method,
        params,
      }),
    });

    if (!response.ok) {
      throw new Error(`Ankr RPC HTTP ${response.status} for ${chainId}:${method}`);
    }

    const payload = await response.json();
    if (payload.error) {
      throw new Error(payload.error.message || `Ankr RPC error for ${chainId}:${method}`);
    }
    return payload.result;
  }

  async getLatestBlock(chainId) {
    const result = await this.call(chainId, "eth_blockNumber");
    return Number.parseInt(result, 16);
  }

  async getNativeBalance(chainId, address, block = "latest") {
    const [balanceHex, latestBlock] = await Promise.all([
      this.call(chainId, "eth_getBalance", [address, block]),
      this.getLatestBlock(chainId),
    ]);

    return {
      chain: chainId,
      address,
      balanceWei: BigInt(balanceHex).toString(),
      displayBalance: formatUnits(BigInt(balanceHex).toString(), 18),
      blockNumber: latestBlock,
    };
  }

  async getErc20Balance(chainId, tokenAddress, walletAddress, decimals = 18) {
    const data = `${BALANCE_OF_SELECTOR}${padAddress(walletAddress)}`;
    const result = await this.call(chainId, "eth_call", [{ to: tokenAddress, data }, "latest"]);
    const rawBalance = BigInt(result).toString();
    return {
      chain: chainId,
      tokenAddress,
      walletAddress,
      rawBalance,
      displayBalance: formatUnits(rawBalance, decimals),
    };
  }

  async getTransactionByHash(chainId, txHash) {
    return this.call(chainId, "eth_getTransactionByHash", [txHash]);
  }

  async getTransactionReceipt(chainId, txHash) {
    return this.call(chainId, "eth_getTransactionReceipt", [txHash]);
  }

  async getBlockByNumber(chainId, blockNumber, fullTransactions = true) {
    const hexBlock = `0x${Number(blockNumber).toString(16)}`;
    return this.call(chainId, "eth_getBlockByNumber", [hexBlock, fullTransactions]);
  }
}



function classifyTransactionStatus({ transaction, receipt, confirmations = 0, requiredConfirmations = 12 }) {
  if (!transaction && !receipt) return "not_found";
  if (receipt?.status === "0x0") return "failed";
  if (receipt?.status === "0x1" && confirmations >= requiredConfirmations) return "confirmed";
  if (receipt?.status === "0x1") return "confirming";
  return "pending";
}

async function lookupTransaction({ rpc, chainId, txHash }) {
  const chain = SUPPORTED_CHAINS[chainId];
  const [transaction, receipt, latestBlock] = await Promise.all([
    rpc.getTransactionByHash(chainId, txHash),
    rpc.getTransactionReceipt(chainId, txHash),
    rpc.getLatestBlock(chainId),
  ]);

  const minedBlock = receipt?.blockNumber ? Number.parseInt(receipt.blockNumber, 16) : null;
  const confirmations = minedBlock ? Math.max(latestBlock - minedBlock + 1, 0) : 0;

  return {
    chain: chainId,
    txHash,
    transaction,
    receipt,
    confirmations,
    status: classifyTransactionStatus({
      transaction,
      receipt,
      confirmations,
      requiredConfirmations: chain.confirmations,
    }),
  };
}

function updatePendingTransaction(transaction, lookupResult) {
  const now = new Date().toISOString();
  if (lookupResult.status === "confirmed") {
    return {
      ...transaction,
      status: "confirmed",
      confirmations: lookupResult.confirmations,
      blockNumber: Number.parseInt(lookupResult.receipt.blockNumber, 16),
      updatedAt: now,
    };
  }

  if (lookupResult.status === "failed") {
    return {
      ...transaction,
      status: "failed",
      confirmations: lookupResult.confirmations,
      updatedAt: now,
    };
  }

  return {
    ...transaction,
    status: transaction.source === "MEMPOOL" ? "pending_mempool" : "pending_local",
    confirmations: lookupResult.confirmations,
    updatedAt: now,
  };
}

async function scanIncomingNativeTransfers({ rpc, chainId, blockNumber, watchedAddresses }) {
  const watched = new Map(watchedAddresses.map((entry) => [entry.address.toLowerCase(), entry]));
  const block = await rpc.getBlockByNumber(chainId, blockNumber, true);
  const matches = [];

  for (const tx of block.transactions || []) {
    const watch = tx.to ? watched.get(tx.to.toLowerCase()) : null;
    if (!watch) continue;
    matches.push({
      txHash: tx.hash,
      userId: watch.userId,
      walletId: watch.walletId,
      chain: chainId,
      from: tx.from,
      to: tx.to,
      amountNativeWei: BigInt(tx.value || "0x0").toString(),
      blockNumber,
      status: "pending_mempool",
      source: "MEMPOOL",
      direction: "incoming",
    });
  }

  return matches;
}

const ENCODER = new TextEncoder();
const DECODER = new TextDecoder();

function toBase64(bytes) {
  return btoa(String.fromCharCode(...new Uint8Array(bytes)));
}

function fromBase64(value) {
  return Uint8Array.from(atob(value), (char) => char.charCodeAt(0));
}

async function derivePreviewKey(passphrase) {
  const digest = await crypto.subtle.digest("SHA-256", ENCODER.encode(passphrase));
  return crypto.subtle.importKey("raw", digest, "AES-GCM", false, ["encrypt", "decrypt"]);
}

async function encryptWalletPreview(payload, passphrase) {
  const key = await derivePreviewKey(passphrase);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ciphertext = await crypto.subtle.encrypt(
    { name: "AES-GCM", iv },
    key,
    ENCODER.encode(JSON.stringify(payload)),
  );

  return {
    algorithm: "AES-256-GCM",
    encryptionVersion: 1,
    ciphertext: toBase64(ciphertext),
    iv: toBase64(iv),
    keyId: "backend-kms-required",
    createdAt: new Date().toISOString(),
  };
}

async function decryptWalletPreview(vaultRecord, passphrase) {
  const key = await derivePreviewKey(passphrase);
  const plaintext = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv: fromBase64(vaultRecord.iv) },
    key,
    fromBase64(vaultRecord.ciphertext),
  );

  return JSON.parse(DECODER.decode(plaintext));
}

const LOCAL_STORE_KEY = "exx.localMirror.v1";

function storage() {
  try {
    return globalThis.localStorage || null;
  } catch {
    return null;
  }
}

function readLocalStore() {
  const local = storage();
  if (!local) return {};
  try {
    return JSON.parse(local.getItem(LOCAL_STORE_KEY) || "{}");
  } catch {
    return {};
  }
}

function writeLocalStore(value) {
  const local = storage();
  if (local) local.setItem(LOCAL_STORE_KEY, JSON.stringify(value));
}

function firestoreValue(value) {
  if (value === null || value === undefined) return { nullValue: null };
  if (Array.isArray(value)) return { arrayValue: { values: value.map(firestoreValue) } };
  if (typeof value === "boolean") return { booleanValue: value };
  if (typeof value === "number") {
    return Number.isInteger(value) ? { integerValue: String(value) } : { doubleValue: value };
  }
  if (typeof value === "object") {
    return {
      mapValue: {
        fields: Object.fromEntries(Object.entries(value).map(([key, child]) => [key, firestoreValue(child)])),
      },
    };
  }
  return { stringValue: String(value) };
}

function firestoreDocument(data) {
  return {
    fields: Object.fromEntries(Object.entries(data).map(([key, value]) => [key, firestoreValue(value)])),
  };
}

class LocalMirrorStore {
  constructor() {
    this.kind = "local";
  }

  async upsert(collection, id, data) {
    const all = readLocalStore();
    all[collection] = all[collection] || {};
    all[collection][id] = {
      ...data,
      mirroredAt: new Date().toISOString(),
    };
    writeLocalStore(all);
    return all[collection][id];
  }
}

class FirebaseRestStore {
  constructor({ projectId, apiKey, idToken }) {
    this.kind = "firebase";
    this.projectId = projectId;
    this.apiKey = apiKey;
    this.idToken = idToken;
  }

  get enabled() {
    return Boolean(this.projectId && this.apiKey && this.idToken);
  }

  documentUrl(collection, id) {
    const encodedId = encodeURIComponent(id);
    return `https://firestore.googleapis.com/v1/projects/${this.projectId}/databases/(default)/documents/${collection}/${encodedId}?key=${this.apiKey}`;
  }

  async upsert(collection, id, data) {
    if (!this.enabled) {
      throw new Error("Firebase REST requires projectId, apiKey, and an authenticated Firebase ID token.");
    }

    const response = await fetch(this.documentUrl(collection, id), {
      method: "PATCH",
      headers: {
        "content-type": "application/json",
        authorization: `Bearer ${this.idToken}`,
      },
      body: JSON.stringify(firestoreDocument(data)),
    });

    if (!response.ok) {
      const text = await response.text();
      throw new Error(`Firebase REST ${response.status}: ${text || response.statusText}`);
    }
    return response.json();
  }
}

class BackendApiStore {
  constructor({ baseUrl }) {
    this.kind = "backend";
    this.baseUrl = String(baseUrl || "").replace(/\/+$/, "");
  }

  get enabled() {
    return Boolean(this.baseUrl);
  }

  documentUrl(collection, id) {
    return `${this.baseUrl}/api/${encodeURIComponent(collection)}/${encodeURIComponent(id)}`;
  }

  async upsert(collection, id, data) {
    if (!this.enabled) throw new Error("Backend API base URL is required.");

    const response = await fetch(this.documentUrl(collection, id), {
      method: "PUT",
      headers: { "content-type": "application/json" },
      body: JSON.stringify(data),
    });

    if (!response.ok) {
      const text = await response.text();
      throw new Error(`Backend API ${response.status}: ${text || response.statusText}`);
    }
    return response.json();
  }
}

function createStore(config) {
  if (config.backendBaseUrl) {
    return new BackendApiStore({ baseUrl: config.backendBaseUrl });
  }
  if (config.firebaseProjectId && config.firebaseApiKey && config.firebaseIdToken) {
    return new FirebaseRestStore({
      projectId: config.firebaseProjectId,
      apiKey: config.firebaseApiKey,
      idToken: config.firebaseIdToken,
    });
  }
  return new LocalMirrorStore();
}


const ETHEREUM_CHAIN_ID = "0x1";

function ethereumProvider() {
  return globalThis.window?.ethereum || null;
}

function hasInjectedWallet() {

async function connectInjectedWallet() {
  const provider = ethereumProvider();
  if (!provider) {
    throw new Error("No browser wallet provider was found. Open this app in a browser with an EIP-1193 wallet extension.");
  }
  const accounts = await provider.request({ method: "eth_requestAccounts" });
  const address = accounts?.[0];
  if (!address) throw new Error("No wallet account was returned by the browser wallet.");
  return {
    address,
    chainId: await provider.request({ method: "eth_chainId" }),
  };
}

function decimalToWeiHex(amount) {
  const [whole = "0", fraction = ""] = String(amount || "0").trim().split(".");
  const fractionWei = fraction.padEnd(18, "0").slice(0, 18);
  const wei = BigInt(whole || "0") * 10n ** 18n + BigInt(fractionWei || "0");
  return `0x${wei.toString(16)}`;
}

async function sendNativeEthereum({ from, to, amount }) {
  const provider = ethereumProvider();
  if (!provider) throw new Error("Connect a browser wallet before sending.");

  const chainId = await provider.request({ method: "eth_chainId" });
  if (chainId !== ETHEREUM_CHAIN_ID) {
    await provider.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: ETHEREUM_CHAIN_ID }],
    });
  }

  return provider.request({
    method: "eth_sendTransaction",
    params: [{
      from,
      to,
      value: decimalToWeiHex(amount),
    }],
  });
}

async function fetchNativeBalances({ rpc, address, chains = Object.keys(SUPPORTED_CHAINS) }) {
  const settled = await Promise.allSettled(
    chains.map((chainId) => rpc.getNativeBalance(chainId, address)),
  );

  return settled.map((result, index) => {
    const chainId = chains[index];
    if (result.status === "fulfilled") {
      return {
        ...result.value,
        ok: true,
      };
    }
    return {
      chain: chainId,
      address,
      ok: false,
      error: result.reason?.message || "Balance lookup failed",
    };
  });
}

async function fetchRegisteredTokenBalances({ rpc, address }) {
  const settled = await Promise.allSettled(
    TOKEN_REGISTRY.map((token) => rpc.getErc20Balance(token.chain, token.address, address, token.decimals)),
  );

  return settled.map((result, index) => {
    const token = TOKEN_REGISTRY[index];
    if (result.status === "fulfilled") {
      return {
        ...token,
        ...result.value,
        ok: true,
      };
    }
    return {
      ...token,
      walletAddress: address,
      ok: false,
      error: result.reason?.message || "Token balance lookup failed",
    };
  });
}

async function checkAnkrHealth({ rpc }) {
  const chainIds = Object.keys(SUPPORTED_CHAINS);
  const started = Date.now();
  const settled = await Promise.allSettled(chainIds.map((chainId) => rpc.getLatestBlock(chainId)));
  return settled.map((result, index) => {
    const chainId = chainIds[index];
    return {
      chain: chainId,
      status: result.status === "fulfilled" ? "healthy" : "failed",
      latestBlock: result.status === "fulfilled" ? result.value : 0,
      scannedBlock: result.status === "fulfilled" ? result.value : 0,
      latencyMs: Date.now() - started,
      errors: result.status === "fulfilled" ? 0 : 1,
      error: result.status === "rejected" ? result.reason?.message : "",
    };
  });
}

async function trackPendingTransactions({ rpc, transactions }) {
  const pending = transactions.filter((tx) => tx.txHash && tx.status.includes("pending"));
  const updates = await Promise.allSettled(
    pending.map((tx) => lookupTransaction({ rpc, chainId: tx.chain, txHash: tx.txHash })),
  );

  return new Map(
    updates
      .map((result, index) => [pending[index].id, result])
      .filter(([, result]) => result.status === "fulfilled")
      .map(([id, result]) => [id, result.value]),
  );
}

async function scanEthereumIncoming({ rpc, address, wallet, fromBlock, toBlock }) {
  const matches = [];
  for (let blockNumber = fromBlock; blockNumber <= toBlock; blockNumber += 1) {
    const blockMatches = await scanIncomingNativeTransfers({
      rpc,
      chainId: "ethereum",
      blockNumber,
      watchedAddresses: [{ address, userId: wallet.userId, walletId: wallet.id }],
    });
    matches.push(...blockMatches);
  }
  return matches;
}

function money(value, options = {}) {
  return new Intl.NumberFormat("en-US", {
    style: "currency",
    currency: "USD",
    minimumFractionDigits: options.compact ? 0 : 2,
    maximumFractionDigits: options.compact ? 0 : 2,
  }).format(value || 0);
}

function compactHash(hash) {
  if (!hash) return "-";
  return `${hash.slice(0, 7)}...${hash.slice(-5)}`;
}

function titleCase(value) {
  return value
    .replace(/_/g, " ")
    .split(" ")
    .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
    .join(" ");
}

function escapeAttr(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll('"', "&quot;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

function statusPill(status) {
  const tone = status.includes("confirmed") || status === "healthy" || status === "active" ? "ok" :
    status.includes("pending") || status === "degraded" || status === "watch" ? "warn" : "bad";
  return `<span class="status-pill ${tone}">${titleCase(status)}</span>`;
}

function chartPath(points, width = 314, height = 150) {
  const min = Math.min(...points);
  const max = Math.max(...points);
  const range = Math.max(max - min, 1);
  return points
    .map((point, index) => {
      const x = (index / (points.length - 1)) * width;
      const y = height - ((point - min) / range) * (height - 20) - 10;
      return `${index === 0 ? "M" : "L"}${x.toFixed(1)} ${y.toFixed(1)}`;
    })
    .join(" ");
}

function areaPath(points, width = 314, height = 150) {
  const line = chartPath(points, width, height);
  return `${line} L${width} ${height} L0 ${height} Z`;
}

  const bytes = crypto.getRandomValues(new Uint8Array(32));
  return `0x${Array.from(bytes, (byte) => byte.toString(16).padStart(2, "0")).join("")}`;
}

function saveConfigFromForm() {

function updateTokenBalancesFromLive(nativeBalances) {
  const priceByChain = {
    ethereum: tokens.find((token) => token.id === "ethereum")?.priceUsd || 0,
    bsc: tokens.find((token) => token.id === "bsc")?.priceUsd || 0,
  };

  const nextTokens = tokens.map((token) => {
    if (token.id === "ethereum") {
      const balance = nativeBalances.find((entry) => entry.chain === "ethereum" && entry.ok);
      if (!balance) return token;
      const amount = Number(balance.displayBalance);
      return { ...token, balance: amount, valueUsd: amount * token.priceUsd };
    }
    if (token.id === "bsc") {
      const balance = nativeBalances.find((entry) => entry.chain === "bsc" && entry.ok);
      if (!balance) return token;
      const amount = Number(balance.displayBalance);
      return { ...token, balance: amount, valueUsd: amount * priceByChain.bsc };
    }
    return token;
  });

  tokens.splice(0, tokens.length, ...nextTokens);
  const confirmedUsd = tokens.reduce((total, token) => total + (token.valueUsd || 0), 0);
  state.wallets = state.wallets.map((wallet, index) => index === 0 ? { ...wallet, confirmedUsd } : wallet);
}

async function syncLiveBalances() {
  const address = activeAddress();
  if (!hasAnkr(state.runtimeConfig)) {
    state.liveStatus = "Ankr key required";
    state.liveError = "Paste an Ankr API key, save config, then sync again.";
    render();
    return;
  }
  try {
    state.liveStatus = "Syncing Ankr balances...";
    state.liveError = "";
    render();
    const rpc = rpcClient();
    const [nativeBalances, tokenBalances, health] = await Promise.all([
      fetchNativeBalances({ rpc, address }),
      fetchRegisteredTokenBalances({ rpc, address }),
      checkAnkrHealth({ rpc }),
    ]);
    state.liveBalances = nativeBalances;
    state.tokenBalances = tokenBalances;
    state.systemStatus = health.map((entry) => ({
      chain: entry.chain,
      status: entry.status,
      latestBlock: entry.latestBlock,
      scannedBlock: entry.scannedBlock,
      latencyMs: entry.latencyMs,
      errors: entry.errors,
    }));
    updateTokenBalancesFromLive(nativeBalances);
    state.liveStatus = "Ankr sync complete";
    await trackAndScan();
    await persistState();
  } catch (error) {
    state.liveError = error.message;
    state.liveStatus = "Ankr sync failed";
  }
  render();
}

async function sendLive() {
  const token = selectedToken();
  const wallet = activeWallet();
  const amount = Number(document.querySelector("#send-amount")?.value || "0");
  const to = document.querySelector("#send-to")?.value || "";
  try {
    state.liveStatus = "Waiting for browser wallet signature...";
    render();
    const txHash = await sendNativeEthereum({
      from: activeAddress(),
      to,
      amount,
    });
    state.transactions.unshift(
      createLocalPendingTransaction({
        userId: wallet.userId,
        walletId: wallet.id,
        chain: "ethereum",
        from: activeAddress(),
        to,
        amountUsd: amount * token.priceUsd,
        amountNative: `${amount} ${token.symbol}`,
        txHash,
      }),
    );
    state.walletScreen = "asset";
    state.liveStatus = "Broadcasted. Tracking pending transaction.";
    await persistState();
    await trackAndScan();
  } catch (error) {
    state.liveError = error.message;
    state.liveStatus = "Send failed";
  }
  render();
}

async function persistState() {
  const store = createStore(state.runtimeConfig);
  const now = new Date().toISOString();
  try {
    state.persistenceStatus = `Syncing ${store.kind}...`;
    const wallet = activeWallet();
    const encryptedVault = await encryptWalletPreview(
      {
        walletId: wallet.id,
        address: activeAddress(),
        custody: state.connectedAddress ? "external-browser-wallet" : "no-private-key-in-browser",
      },
      `vault-${wallet.id}-${activeAddress()}`,
    );
    await Promise.all([
      ...state.users.map((user) => store.upsert("users", user.id, { ...user, updatedAt: now })),
      ...getWallets().map((walletRecord) => store.upsert("wallets", walletRecord.id, {
        ...walletRecord,
        vault: encryptedVault,
        updatedAt: now,
      })),
      ...state.transactions.map((tx) => store.upsert("transactions", tx.id, { ...tx, updatedAt: now })),
      ...state.systemStatus.map((status) => store.upsert("system_status", status.chain, { ...status, updatedAt: now })),
    ]);
    state.persistenceStatus = store.kind === "firebase"
      ? "Firebase sync complete"
      : store.kind === "backend"
        ? "Backend API sync complete"
        : "Local encrypted mirror synced";
  } catch (error) {
    state.persistenceStatus = `Persistence failed: ${error.message}`;
  }
}

async function trackAndScan() {
  const rpc = rpcClient();
  const updates = await trackPendingTransactions({ rpc, transactions: state.transactions });
  state.transactions = state.transactions.map((tx) => {
    const lookup = updates.get(tx.id);
    if (!lookup) return tx;
    if (lookup.status === "confirmed") {
      return {
        ...tx,
        status: "confirmed",
        confirmations: lookup.confirmations,
        updatedAt: new Date().toISOString(),
      };
    }
    if (lookup.status === "failed") return { ...tx, status: "failed", updatedAt: new Date().toISOString() };
    return { ...tx, confirmations: lookup.confirmations, updatedAt: new Date().toISOString() };
  });

  const ethereumStatus = state.systemStatus.find((entry) => entry.chain === "ethereum");
  if (!ethereumStatus?.latestBlock) return;
  const fromBlock = state.lastScannedEthereumBlock ? state.lastScannedEthereumBlock + 1 : ethereumStatus.latestBlock;
  const toBlock = Math.min(ethereumStatus.latestBlock, fromBlock + 2);
  if (fromBlock > toBlock) return;

  const wallet = activeWallet();
  const matches = await scanEthereumIncoming({
    rpc,
    address: activeAddress(),
    wallet,
    fromBlock,
    toBlock,
  });
  state.lastScannedEthereumBlock = toBlock;
  const knownHashes = new Set(state.transactions.map((tx) => tx.txHash));
  matches
    .filter((match) => !knownHashes.has(match.txHash))
    .forEach((match) => {
      state.transactions.unshift({
        id: `scan-${match.txHash}`,
        txHash: match.txHash,
        userId: match.userId,
        walletId: match.walletId,
        chain: match.chain,
        from: match.from,
        to: match.to,
        amountUsd: 0,
        amountNative: `${match.amountNativeWei} wei`,
        direction: "incoming",
        source: "MEMPOOL",
        status: "pending_mempool",
        confirmations: 0,
        firstSeenAt: new Date().toISOString(),
      });
    });
}

function bindEvents() {
  app.addEventListener("click", (event) => {
    const target = event.target.closest("[data-action]");
    if (!target) return;

    const action = target.dataset.action;
    if (action === "wallet") state.mode = "wallet";
    if (action === "admin") state.mode = "admin";
    if (action === "screen") state.walletScreen = target.dataset.screen;
    if (action === "token") {
      state.selectedTokenId = target.dataset.token;
      state.walletScreen = "asset";
    }
    if (action === "admin-view") state.adminView = target.dataset.view;
    if (action === "tx-filter") state.txFilter = target.dataset.filter;
    if (action === "simulate-send") simulateSend();
    if (action === "simulate-incoming") simulateIncoming();
    if (action === "encrypt-preview") encryptPreview();
    if (action === "connect-wallet") connectWallet();
    if (action === "save-config") saveConfigFromForm();
    if (action === "sync-live") syncLiveBalances();
    if (action === "send-live") sendLive();
    if (action === "persist-state") persistState().then(render);

    if (!["simulate-send", "simulate-incoming", "encrypt-preview", "connect-wallet", "save-config", "sync-live", "send-live", "persist-state"].includes(action)) {
      render();
    }
  });

  app.addEventListener("input", (event) => {
    if (event.target.matches("[data-action='asset-search']")) {
      state.assetSearch = event.target.value;
      render();
      const input = document.querySelector("[data-action='asset-search']");
      input?.focus();
      input?.setSelectionRange(state.assetSearch.length, state.assetSearch.length);
    }
  });
}

async function advanceRealtimeState() {
  state.syncTick += 1;
  if (state.runtimeConfig.enablePolling && state.liveBalances.length) {
    try {
      await trackAndScan();
      await persistState();
      state.liveStatus = "Live pending tracker tick";
    } catch (error) {
      state.liveError = error.message;
      state.liveStatus = "Live pending tracker failed";
    }
    render();
    return;
  }

  state.transactions = state.transactions.map((tx) => {
    if (!tx.status.includes("pending")) return tx;
    const confirmations = tx.confirmations + (tx.source === "MEMPOOL" ? 2 : 1);
    if (confirmations >= 6) {
      return {
        ...tx,
        status: "confirmed",
        confirmations,
        updatedAt: new Date().toISOString(),
      };
    }
    return {
      ...tx,
      confirmations,
      updatedAt: new Date().toISOString(),
    };
  });

  state.systemStatus = state.systemStatus.map((chain, index) => ({
    ...chain,
    latestBlock: chain.latestBlock + 1 + (index % 2),
    scannedBlock: chain.scannedBlock + 1,
    latencyMs: Math.max(90, chain.latencyMs + (state.syncTick % 3) - 1),
  }));

  render();
}

bindEvents();

setInterval(advanceRealtimeState, 5000);
